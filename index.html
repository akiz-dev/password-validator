<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Strong Password Validator</title>
	<!-- font awesome -->
	<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
	<!-- googlr fonts -->
	<link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
	<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
	<!-- my stylesheet -->
	<link rel="stylesheet" type="text/css" href="css/style.css">
</head>
<body>

	<div class="container">
		<h1>Strong Password Validator</h1>
		<div class="contents__wrapper">
			
			<form>
				<div class="psw__wrapper">
					<input type="password" name="psw" id="inputPsw" placeholder="Type your password..."><i class="fa-regular fa-eye" title="show password"></i>
				</div>
				
			</form>
			<div id="display">
				
				<p class="display__title">Type password above</p>
				<p class="display__el1"></p>
				<p class="display__el2"></p>
				<p class="display__el3"></p>
				<p class="display__el4"></p>
			</div><!--./display-->
		</div><!--./contents__wrapper-->
	</div><!--./container-->


	<!-- script.js -->
	<script src="js/script.js"></script>
</body>
</html>
